    <rect x="299" y="292" width="427" height="310" rx="37" fill="url(#paper)"/>
    <rect x="352.5" y="346.5" width="319" height="209" rx="26" stroke="#2F4051" stroke-width="30"/>
    <rect x="385.5" y="378.5" width="253" height="144" rx="12" fill="#FFFDF8"/>
    <rect x="418.5" y="485" width="187" height="20" rx="10" fill="#2D3D4D"/>
  </g>

  <g filter="url(#softLineShadow)">
