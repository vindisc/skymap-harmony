  <rect x="72" y="56" width="880" height="856" rx="198" fill="url(#base)" filter="url(#baseShadow)"/>
  <rect x="76" y="60" width="872" height="848" rx="194" stroke="#FFFFFF" stroke-opacity="0.74" stroke-width="18"/>
  <rect x="92" y="82" width="840" height="820" rx="174" stroke="#D8D5CC" stroke-opacity="0.34" stroke-width="10"/>

