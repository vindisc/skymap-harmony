<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="440" height="820" viewBox="0 0 440 820" font-family="-apple-system, 'Noto Sans SC', sans-serif">
  <defs>
    <linearGradient id="photoBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d6d3cd"/>
      <stop offset="100%" stop-color="#b8b4ac"/>
    </linearGradient>
    <linearGradient id="cardShadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00000000"/>
      <stop offset="100%" stop-color="#00000018"/>
    </linearGradient>
  </defs>

  <!-- 手机边框 -->
  <rect x="10" y="10" width="420" height="800" rx="42" fill="#f5f4f2" stroke="#c9c6c1" stroke-width="1"/>
  <rect x="18" y="18" width="404" height="784" rx="36" fill="#ffffff"/>

  <!-- 顶栏 -->
  <g transform="translate(30, 34)">
    <text x="0" y="18" font-size="15" fill="#161616">⟨ 返回</text>
    <text x="182" y="18" font-size="16" fill="#161616" font-weight="600" text-anchor="middle">相框</text>
    <text x="368" y="18" font-size="15" fill="#161616" text-anchor="end">导出 ⋯</text>
  </g>
  <line x1="30" y1="72" x2="410" y2="72" stroke="#eeece8" stroke-width="1"/>

  <!-- 区 A · 预览 -->
  <g transform="translate(30, 88)">
    <rect x="0" y="0" width="380" height="430" rx="12" fill="#faf9f6" stroke="#eae7e0" stroke-width="1"/>
    <text x="190" y="20" font-size="10" fill="#8a8680" text-anchor="middle">预览为屏幕缩略 · 导出保留原图分辨率</text>

    <!-- 卡片（白色边框内嵌照片） -->
    <g transform="translate(50, 44)">
      <rect x="0" y="0" width="280" height="352" fill="#ffffff" stroke="#e0dcd4" stroke-width="1"/>
      <rect x="0" y="0" width="280" height="352" fill="url(#cardShadow)"/>
      <!-- 内嵌照片 -->
      <rect x="22" y="22" width="236" height="270" fill="url(#photoBg)"/>
      <!-- 山与太阳的简化示意 -->
      <circle cx="90" cy="90" r="16" fill="#f0e6d0" opacity="0.75"/>
      <polygon points="22,292 78,200 132,240 190,180 258,292" fill="#8b8578" opacity="0.85"/>
      <!-- 底部标签栏（示意：L1 参数底栏） -->
      <text x="22" y="326" font-size="10" fill="#161616" font-weight="700">SONY A7M4</text>
      <text x="258" y="326" font-size="9" fill="#5f6368" text-anchor="end">35mm f/2.8 1/500 ISO400</text>
    </g>
  </g>

  <!-- 区 B1 · 档位 Tab -->
  <g transform="translate(30, 534)">
    <text x="26" y="16" font-size="13" fill="#161616" font-weight="600">相框</text>
    <text x="106" y="16" font-size="13" fill="#8a8680">参数</text>
    <text x="176" y="16" font-size="13" fill="#8a8680">一句话</text>
    <text x="278" y="16" font-size="13" fill="#8a8680">复盘</text>
    <!-- 选中下划线（当前档位：参数） -->
    <line x1="86" y1="24" x2="126" y2="24" stroke="#161616" stroke-width="2"/>
    <line x1="0" y1="34" x2="380" y2="34" stroke="#eeece8" stroke-width="1"/>
  </g>

  <!-- 区 B2 · 模板横滑 -->
  <g transform="translate(30, 578)">
    <!-- 5 个 chip -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="60" height="76" rx="8" fill="#ffffff" stroke="#161616" stroke-width="2"/>
      <rect x="8" y="8" width="44" height="44" fill="#ffffff" stroke="#d6d3cd" stroke-width="1"/>
      <rect x="14" y="14" width="32" height="24" fill="url(#photoBg)"/>
      <line x1="14" y1="42" x2="46" y2="42" stroke="#161616" stroke-width="0.8"/>
      <text x="30" y="66" font-size="9" fill="#161616" text-anchor="middle">参数</text>
    </g>
    <g transform="translate(72, 0)">
      <rect x="0" y="0" width="60" height="76" rx="8" fill="#faf9f6" stroke="#e0dcd4" stroke-width="1"/>
      <rect x="8" y="8" width="44" height="44" fill="#ffffff" stroke="#d6d3cd" stroke-width="1"/>
      <rect x="14" y="14" width="32" height="24" fill="url(#photoBg)"/>
      <text x="30" y="66" font-size="9" fill="#5f6368" text-anchor="middle">中文</text>
    </g>
    <g transform="translate(144, 0)">
      <rect x="0" y="0" width="60" height="76" rx="8" fill="#faf9f6" stroke="#e0dcd4" stroke-width="1"/>
      <rect x="8" y="8" width="44" height="44" fill="#ffffff" stroke="#d6d3cd" stroke-width="1"/>
      <rect x="14" y="14" width="32" height="20" fill="url(#photoBg)"/>
      <rect x="14" y="38" width="16" height="4" fill="#161616"/>
      <rect x="14" y="45" width="24" height="3" fill="#5f6368"/>
      <text x="30" y="66" font-size="9" fill="#5f6368" text-anchor="middle">分栏</text>
    </g>
    <g transform="translate(216, 0)">
      <rect x="0" y="0" width="60" height="76" rx="8" fill="#faf9f6" stroke="#e0dcd4" stroke-width="1"/>
      <rect x="8" y="8" width="44" height="44" fill="#ffffff" stroke="#d6d3cd" stroke-width="1"/>
      <rect x="14" y="14" width="32" height="24" fill="url(#photoBg)"/>
      <text x="30" y="46" font-size="6" fill="#161616" text-anchor="middle">SONY</text>
      <text x="30" y="66" font-size="9" fill="#5f6368" text-anchor="middle">柔焦</text>
    </g>
    <g transform="translate(288, 0)">
      <rect x="0" y="0" width="60" height="76" rx="8" fill="#faf9f6" stroke="#e0dcd4" stroke-width="1"/>
      <rect x="8" y="8" width="44" height="44" fill="#ffffff" stroke="#d6d3cd" stroke-width="1"/>
      <rect x="14" y="14" width="32" height="24" fill="url(#photoBg)"/>
      <text x="30" y="66" font-size="9" fill="#5f6368" text-anchor="middle">签名</text>
    </g>
    <!-- 溢出提示 -->
    <text x="376" y="42" font-size="14" fill="#c9c6c1" text-anchor="middle">›</text>
  </g>

  <!-- 分割线 -->
  <line x1="30" y1="672" x2="410" y2="672" stroke="#eeece8" stroke-width="1"/>

  <!-- 区 C · 抽屉入口 -->
  <g transform="translate(30, 684)">
    <text x="0" y="14" font-size="12" fill="#8a8680">当前模板不需要文本，直接调参或保存</text>

    <!-- chip: 边框参数 -->
    <g transform="translate(0, 30)">
      <rect x="0" y="0" width="110" height="42" rx="21" fill="#ffffff" stroke="#e0dcd4" stroke-width="1"/>
      <text x="55" y="26" font-size="13" fill="#161616" text-anchor="middle">⚙ 边框参数</text>
    </g>
    <!-- chip: EXIF -->
    <g transform="translate(122, 30)">
      <rect x="0" y="0" width="110" height="42" rx="21" fill="#ffffff" stroke="#e0dcd4" stroke-width="1"/>
      <text x="55" y="26" font-size="13" fill="#161616" text-anchor="middle">📷 EXIF</text>
    </g>
    <!-- chip: 保存 -->
    <g transform="translate(244, 30)">
      <rect x="0" y="0" width="136" height="42" rx="21" fill="#161616"/>
      <text x="68" y="26" font-size="13" fill="#ffffff" text-anchor="middle">💾 保存</text>
    </g>
  </g>

  <!-- 底部指示器 -->
  <rect x="176" y="792" width="88" height="4" rx="2" fill="#c9c6c1"/>

  <!-- 侧栏注释 -->
  <g transform="translate(0, 88)" font-size="10" fill="#8a8680">
    <text x="14" y="220" text-anchor="middle" transform="rotate(-90, 14, 220)">区 A · 预 览 (55~62%)</text>
  </g>
  <g transform="translate(0, 534)" font-size="10" fill="#8a8680">
    <text x="14" y="30" text-anchor="middle" transform="rotate(-90, 14, 30)">B1 tab</text>
  </g>
  <g transform="translate(0, 578)" font-size="10" fill="#8a8680">
    <text x="14" y="50" text-anchor="middle" transform="rotate(-90, 14, 50)">B2 模板条</text>
  </g>
  <g transform="translate(0, 684)" font-size="10" fill="#8a8680">
    <text x="14" y="60" text-anchor="middle" transform="rotate(-90, 14, 60)">区 C · 内容与抽屉</text>
  </g>
</svg>
